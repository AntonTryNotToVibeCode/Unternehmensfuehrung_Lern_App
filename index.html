<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unternehmensführung – Lernkarten</title>
<style>
:root {
  --bg:#0b1020; --bg2:#0d1430; --panel:#121933; --panel2:#1a2345; --text:#edf2ff; --muted:#aeb8d4;
  --accent:#7aa2ff; --good:#27c281; --bad:#ff6b6b; --border:#2b376b;
}
body.light {
  --bg:#f5f7fb; --bg2:#e9eef9; --panel:#ffffff; --panel2:#eef2fb; --text:#182033; --muted:#5f6b85;
  --accent:#4b74ff; --good:#1f9d68; --bad:#d94b4b; --border:#d8dfef;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2)); color:var(--text);
}
.wrap { max-width:1100px; margin:0 auto; padding:24px; display:flex; flex-direction:column; gap:12px; }
.card {
  background:rgba(18,25,51,.92);
  border:1px solid var(--border); border-radius:18px; padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
body.light .card { background:rgba(255,255,255,.92); }
h1 { margin:0 0 8px; font-size:1.8rem; }
.muted { color:var(--muted); }
.controls { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); align-items:end; }
.control label { display:block; margin-bottom:6px; color:var(--muted); }
.control input,.control select {
  width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
  border-radius:12px; padding:10px 12px;
}
.row,.status,.footer { display:flex; gap:10px; flex-wrap:wrap; }
.status { gap:14px; margin-top:12px; color:var(--muted); }
button {
  background:var(--accent); color:white; border:0; padding:10px 14px; border-radius:12px; cursor:pointer; font-weight:700;
}
button.secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
button.good { background:var(--good); }
button.bad { background:var(--bad); }
button:disabled { opacity:.6; cursor:not-allowed; }
.pill {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 10px; border-radius:999px; background:var(--panel2); border:1px solid var(--border); color:var(--muted);
}
.question { font-size:1.55rem; line-height:1.45; margin:6px 0 18px; }
.answerBox {
  border:1px solid var(--border); background:var(--panel2); border-radius:14px; padding:16px 18px;
  line-height:1.6; white-space:pre-wrap;
}
.hidden { display:none; }
.progress {
  height:10px; background:var(--panel2); border-radius:999px; overflow:hidden; margin-top:12px; border:1px solid var(--border);
}
.progress > div { height:100%; width:0; background:var(--accent); transition:width .25s ease; }
.small { font-size:.92rem; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Lernkarten Unternehmensführung</h1>
    <div class="muted">Kapitelbasierter Frage-Antwort-Katalog</div>
    <div class="status">
      <span class="pill">Gesamt: <strong id="totalCount">0</strong></span>
      <span class="pill">Im Stapel: <strong id="stackCount">0</strong></span>
      <span class="pill">Gesehen: <strong id="seenCount">0</strong></span>
      <span class="pill">Richtig: <strong id="correctCount">0</strong></span>
      <span class="pill">Falsch: <strong id="wrongCount">0</strong></span>
      <span class="pill">Aktuell: <strong id="positionCount">0 / 0</strong></span>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <div class="control">
        <label for="category">Stapel</label>
        <select id="category">
          <option value="all">Alle Kapitel gemischt</option>
          <option value="Grundlagen zur Unternehmensführung">1. Grundlagen zur Unternehmensführung</option>
          <option value="Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung">2. Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung</option>
          <option value="Die verschiedenen Ebenen der Unternehmensführung">3. Die verschiedenen Ebenen der Unternehmensführung</option>
          <option value="Unternehmensführungsfunktionen">4. Unternehmensführungsfunktionen</option>
        </select>
      </div>
      <div class="control"><label for="search">Suche</label><input id="search" type="text" placeholder="Stichwort in Frage oder Antwort"></div>
      <div class="control"><label for="limit">Anzahl</label><select id="limit"><option value="0">Alle</option><option value="10">10</option><option value="20">20</option><option value="50" selected>50</option><option value="100">100</option></select></div>
      <div class="control"><label for="order">Reihenfolge</label><select id="order"><option value="random" selected>Zufällig</option><option value="normal">Original</option><option value="unseen">Nur neue Fragen</option></select></div>
    </div>
    <div class="row" style="margin-top:14px">
      <button id="startBtn">Lernkarten starten</button>
      <button class="secondary" id="restartBtn">Neu mischen</button>
      <button class="secondary" id="themeBtn">Hellmodus</button>
      <button class="secondary" id="resetProgressBtn">Fortschritt zurücksetzen</button>
    </div>
    <div class="progress"><div id="bar"></div></div>
  </div>

  <div class="card">
    <div class="small muted" id="meta"></div>
    <div class="question" id="question">Klicke auf „Lernkarten starten“.</div>
    <div class="answerBox hidden" id="answer"></div>
    <div class="footer" style="margin-top:14px">
      <button id="showBtn" class="hidden">Antwort anzeigen</button>
      <button id="correctBtn" class="good hidden">Richtig</button>
      <button id="wrongBtn" class="bad hidden">Falsch</button>
      <button id="nextBtn" class="hidden">Nächste Frage</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was ist Unternehmensführung?', answer: 'Die Gestaltung des Prozesses der betrieblichen Leistungserstellung und -verwertung im Hinblick auf die Erreichung der Unternehmensziele auf höchstmöglichem Niveau.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Elemente gehören zur Unternehmensführung?', answer: 'Zielbildung; Planung und Entscheidung; Ausführung; Kontrolle; Informationsbeschaffung und Koordination aller Teilsysteme durch das Management.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Zielbildung in der Unternehmensführung?', answer: 'Konkretisierung der Unternehmensziele, zum Beispiel langfristige Gewinnmaximierung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeuten Planung und Entscheidung in der Unternehmensführung?', answer: 'Alternativen zur Zielerreichung identifizieren und die beste Alternative zur Erreichung der Ziele auswählen.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Ausführung in der Unternehmensführung?', answer: 'Umsetzung der geplanten Maßnahmen, einschließlich der Beschaffung von Material und Personal.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Kontrolle in der Unternehmensführung?', answer: 'Feststellung von Planabweichungen und Einleitung von Gegensteuerungsmaßnahmen.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Warum ist Informationsbeschaffung für die Unternehmensführung wichtig?', answer: 'Weil Informationen für alle Phasen der Unternehmensführung benötigt werden.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche drei Instrumente der Unternehmensführung gibt es im Hinblick auf Strukturen, Prozesse und Personen?', answer: 'Gewaltenteilung; Anreizsysteme; Überwachungssysteme.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Gewaltenteilung als Instrument der Unternehmensführung?', answer: 'Verteilung von Rechten auf mehrere Personen oder Stellen zur Eindämmung opportunistischen Verhaltens.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Anreizsysteme in der Unternehmensführung?', answer: 'Instrumente zur Verringerung opportunistischen Verhaltens, zum Beispiel erfolgsabhängige Entlohnung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Überwachungssysteme in der Unternehmensführung?', answer: 'Systeme zur Identifikation von Risiken und zur frühzeitigen Bereitstellung von Informationen für das Management.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was besagt die Transaktionskostentheorie nach Coase?', answer: 'Es gibt zwei Formen der Koordination von Entscheidungen: Markt und Hierarchie. Die Transaktionskosten dienen als Auswahlkriterium.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche zwei Formen der Koordination unterscheidet die Transaktionskostentheorie?', answer: 'Märkte als dezentraler Preismechanismus und Hierarchie als zentrale Weisung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Arten von Transaktionskosten gibt es?', answer: 'Ex-ante-Kosten und Ex-post-Kosten.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Ex-ante-Transaktionskosten?', answer: 'Kosten für Suche, Anbahnung und Verhandlung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Ex-post-Transaktionskosten?', answer: 'Kosten für Überwachung, Streitschlichtung, Nachverhandlung und Absicherung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was ist das Ziel der Transaktionskostentheorie?', answer: 'Die Minimierung der Transaktionskosten im Zuge wirtschaftlicher Tätigkeit.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Folgen ergeben sich aus der Transaktionskostentheorie?', answer: 'Entscheidungen über Eigen- oder Fremdfertigung sowie über Formen der Kooperation, zum Beispiel langfristige Verträge oder Integration.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was ist die Prinzipal-Agenten-Theorie?', answer: 'Sie beschreibt eine asymmetrische Informationsverteilung zwischen Prinzipal und Agent, die durch Interessenkonflikte den Abschluss optimaler Verträge erschwert.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet hidden information in der Prinzipal-Agenten-Theorie?', answer: 'Der Prinzipal kann Eigenschaften oder Absichten des Agenten nicht vollständig erkennen.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet hidden action in der Prinzipal-Agenten-Theorie?', answer: 'Der Prinzipal kann die Handlungen oder Anstrengungen des Agenten nicht vollständig beobachten.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Folgen asymmetrischer Informationsverteilung gibt es?', answer: 'Moral Hazard; Adverse Selection; Hold-up; Qualitätsunsicherheit und Verhaltensunsicherheit.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Moral Hazard?', answer: 'Der Prinzipal muss sich auf den guten Willen des Agenten verlassen, weil dessen Verhalten nicht vollständig beobachtbar ist.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was ist Qualitätsunsicherheit in der Prinzipal-Agenten-Theorie?', answer: 'Unsicherheit aufgrund versteckter Informationen, also hidden information und adverse selection.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was ist Verhaltensunsicherheit in der Prinzipal-Agenten-Theorie?', answer: 'Unsicherheit aufgrund versteckter Handlungen, also hidden action und moral hazard.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Gegenmaßnahmen gibt es in der Prinzipal-Agenten-Theorie?', answer: 'Informations-, Kontroll- und Überwachungssysteme; Anreizsysteme; Gestaltung von sich selbst durchsetzenden Verträgen.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche vertrauensbildenden Maßnahmen des Agenten gibt es vor Vertragsabschluss?', answer: 'Direkte Kontrolle durch Screening; glaubwürdige Signale durch Signalling, zum Beispiel Zeugnisse; Interessenangleichung über Reputation.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche vertrauensbildenden Maßnahmen des Agenten gibt es nach Vertragsabschluss?', answer: 'Interessenangleichung durch Anreize, zum Beispiel Ergebnisbeteiligung; Reduzierung der Informationsasymmetrie durch Planungs- und Kontrollsysteme; Sicherheiten wie Leistungsgarantien, Bürgschaften oder Gegengeschäfte.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Grundgedanken der Theorie der Verfügungsrechte?', answer: 'Nutzen entsteht nicht durch Güter selbst, sondern durch Rechte an ihnen. Gegenstand wirtschaftlicher Transaktionen sind Verfügungsrechte. Die Zuordnung dieser Rechte beeinflusst Marktergebnisse.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Elemente gehören zu Verfügungsrechten?', answer: 'Das Recht zum Gebrauch und das Recht zur Aneignung von Erträgen.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Arten staatlicher Eingriffe in Verfügungsrechte gibt es?', answer: 'Ex-ante-Verteilung, zum Beispiel Haftungsregeln, und Einschränkung der Veräußerbarkeit, zum Beispiel Kündigungsschutz.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was besagt das Coase-Theorem?', answer: 'Die Ex-ante-Verteilung von Verfügungsrechten ist für die effiziente Ex-post-Verteilung unerheblich, wenn bestimmte Voraussetzungen erfüllt sind. Durch Umverteilung können externe Effekte internalisiert werden.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Voraussetzungen hat das Coase-Theorem?', answer: 'Rechtssicherheit; uneingeschränkte Veräußerbarkeit von Verfügungsrechten; vollkommener Markt für Verfügungsrechte; vollkommener Kapitalmarkt.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Probleme entstehen bei Verfügungsrechten durch Unvollkommenheit und Opportunismus?', answer: 'Individuelle Gewinnoptimierung; positive externe Effekte mit tendenziell zu geringem Faktoreinsatz; Interdependenz der Inputentscheidungen; Suche nach einem Nash-Gleichgewicht.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Wie lassen sich Probleme bei Verfügungsrechten lösen?', answer: 'Einführung einer dritten Partei als Leitungs- und Kontrollinstanz; Abtreten der gesamten Produktion an diese Partei gegen Entgelt; Unterwerfung unter Sanktionen; Sanktionsdrohung bei Minderleistung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Wo kann die Theorie der Verfügungsrechte eingesetzt werden?', answer: 'Bei der Analyse des Rechts oder der Unternehmensverfassung, insbesondere bei Fragen danach, wer entscheiden darf und ob die Verteilung der Rechte effizient ist.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Unternehmungen und warum gibt es sie?', answer: 'Dauerhafte kooperative Veranstaltungen mehrerer Individuen zur Sicherung von Vorteilen durch koordiniertes Verhalten. Entscheidungen werden wenigstens teilweise durch Weisungen koordiniert, um Wertminderungen durch externe Effekte und Transaktionskosten zu vermeiden.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Wie werden Betriebe charakterisiert?', answer: 'Sie kombinieren Produktionsfaktoren und folgen dem Prinzip der Wirtschaftlichkeit sowie dem Prinzip des finanziellen Gleichgewichts.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Wie werden öffentliche Verwaltungen charakterisiert?', answer: 'Sie orientieren sich an einem zentralen Volkswirtschaftsplan und folgen dem Prinzip der Planerfüllung sowie dem Prinzip des Gemeineigentums.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Wie werden Unternehmungen charakterisiert?', answer: 'Durch Selbstbestimmung des Wirtschaftsplans, erwerbswirtschaftliches Prinzip und Prinzip des Privateigentums.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Merkmale hat der Betrieb in der Marktwirtschaft?', answer: 'Autonomieprinzip; Privateigentum; erwerbswirtschaftliches Prinzip.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet das Autonomieprinzip?', answer: 'Selbstbestimmung des Wirtschaftsplans.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Privateigentum im Betrieb der Marktwirtschaft?', answer: 'Betriebsmittel und Werkstoffe stehen im Eigentum der Kapitalgeber.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet das erwerbswirtschaftliche Prinzip?', answer: 'Gewinnmaximierung als zentrales Ziel.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Merkmale hat der Betrieb in der Planwirtschaft?', answer: 'Organprinzip; Gemeineigentum; Prinzip plandeterminierter Leistungserstellung.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet das Organprinzip?', answer: 'Der Betrieb ist Organ der Gesamtwirtschaft und unterliegt zentralen Planinstanzen.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet Gemeineigentum in der Planwirtschaft?', answer: 'Vergesellschaftetes Eigentum an den Produktionsmitteln.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was bedeutet das Prinzip plandeterminierter Leistungserstellung?', answer: 'Die Planerfüllung ist Motor der betrieblichen Aktivitäten; Wirtschaftlichkeit ist untergeordnet.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was ist ein System im systemtheoretischen Ansatz?', answer: 'Ein Ganzes, das aus Subsystemen besteht, von anderen Systemen unterschieden werden kann, Inputs aus der Umwelt bezieht, diese in Outputs transformiert und zur Zielerreichung des Gesamtsystems beiträgt.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Was sind Systemgrenzen im systemtheoretischen Ansatz?', answer: 'Sie trennen ein System von seiner Umwelt.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Bedeutung haben Systemgrenzen für ein System?', answer: 'Über sie fließen Material, Energie, Kapital, Menschen, Betriebsmittel, Werkstoffe, Produkte, Dienstleistungen, Abfall und Rückkopplungen zwischen System und Umwelt.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Aufgabe hat Führung in einem offenen System?', answer: 'Sie hält die Elemente des Systems, die für dessen Lebensfähigkeit entscheidend sind, funktionsfähig.' },
  { category: 'Grundlagen zur Unternehmensführung', question: 'Welche Merkmale hat Führung in einem offenen System?', answer: 'Förderung der Vielfalt der Teilelemente; flexible Organisationsstruktur; dynamische Reaktion auf Veränderungen; Offenheit gegenüber Umwelt und Anspruchsgruppen; Controllingsystem zur Informationsaufbereitung; Selbstorganisation von Mitarbeitern und Teams.' },

  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche fünf Umwelten eines Unternehmens gibt es?', answer: 'Technologische Umwelt; ökonomische Umwelt; physikalisch-ökologische Umwelt; politisch-rechtliche Umwelt; soziodemographische Umwelt.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche drei Eigenschaften von Umwelten gibt es?', answer: 'Umweltkomplexität; Umweltdynamik; Umweltdruck.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche drei hierarchischen Umweltebenen gibt es?', answer: 'Gesamtumwelt, zum Beispiel die Branche; Umwelt mit direkter Beziehung zur Organisation, zum Beispiel Kunden und Lieferanten; Umwelt einzelner Abteilungen, zum Beispiel HR und Personalkandidaten.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche internen Stakeholder und Interessen gibt es?', answer: 'Eigentümer und Management: Einkommen, Erhaltung und Steigerung der Investition, Macht, Entfaltung eigener Ideen. Mitarbeiter: Einkommen, Sicherheit, Sinnhaftigkeit, soziale Aspekte und Status.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche externen Stakeholder und Interessen gibt es?', answer: 'Fremdkapitalgeber: sichere Anlage, Verzinsung, Vermögenszuwachs. Lieferanten: stabile Liefermöglichkeiten, günstige Konditionen, Zahlungsfähigkeit der Abnehmer. Kunden: qualitativ und quantitativ gute Produkte, günstige Preise, guter Service. Konkurrenz: Einhaltung fairer Grundsätze, eventuell Kooperation. Staat und Gesellschaft: Steuern, Arbeitsplätze, Sozialleistungen, Infrastrukturbeiträge, Einhaltung der Gesetze und Erhalt der Umwelt.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche Merkmale hat die Shareholder-Value-Politik?', answer: 'Ziel ist die Bestands- und Überlebenssicherung des Unternehmens. Shareholder und ihre Interessen stehen im Vordergrund. Bestehende Erfolgspotenziale sollen gehalten, abgeschöpft und ausgebaut werden. Ein hoher Einfluss der Shareholder ist erforderlich.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche Merkmale hat die Stakeholder-Politik?', answer: 'Ziel ist die langfristige Unternehmensentwicklung. Stakeholder stehen im Vordergrund. Die Unternehmenspolitik sucht und schafft neue unternehmerische Erfolgspotenziale. Förderlich sind dynamische und komplexe Märkte und Umwelten.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Wann entsteht im Shareholder-Ansatz ein Prinzipal-Agent-Problem?', answer: 'Bei Fremdorganschaft. Durch Informationsasymmetrie kennt der Manager sein Verhalten, seine Fähigkeiten und Entscheidungen besser als der Eigentümer. Durch Interessendivergenz maximiert der Manager möglicherweise seinen eigenen Nutzen statt des Unternehmenswerts. Durch Opportunismus kann er seinen Wissensvorsprung zu seinem Vorteil ausnutzen.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche drei Hauptaspekte der Unternehmensführung gibt es?', answer: 'Unternehmensführung als Institution; als Prozess; als Funktion.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Was bedeutet Führung als Institution?', answer: 'Die Gesamtheit der leitenden Instanzen, also die Führungskräfte mit Entscheidungs- und Weisungsrechten als Personengruppe des Unternehmens. Dazu gehören Top-, Middle- und Lower-Management.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Was bedeutet Führung als Prozess?', answer: 'Die Gesamtheit kontinuierlich anfallender Aufgaben und Schritte zur Problemlösung. Führung umfasst Willensbildung und Willensdurchsetzung gegenüber anderen Personen sowie das Tragen von Verantwortung. Gemeint ist der Managementzyklus beziehungsweise Managementprozess.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Was bedeutet Führung als Funktion?', answer: 'Die Gesamtheit aller Aufgaben, die zur Lenkung eines Unternehmens notwendig sind. Dazu gehören keine rein operativen Aufgaben, sondern zum Beispiel Organisation, Controlling und Personalführung.' },
  { category: 'Rahmenbedingungen und Wirkungsrichtungen der Unternehmensführung', question: 'Welche zwei Meinungen gibt es zur Frage nach dem Treiber des Wohlstands in Industrienationen?', answer: 'Nach Smith, Taylor und Gutenberg sind Arbeitsteilung und effiziente Koordination durch rationale Planung und Organisation der zentrale Treiber. Nach Schumpeter ist Innovation die Durchsetzung neuer Kombinationen und damit der entscheidende Treiber.' },

  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche vier Elemente gehören zur normativen Unternehmensführung?', answer: 'Unternehmensbild; Unternehmensidentität; Unternehmensphilosophie; Unternehmenskultur.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche zwei Aspekte hat das Unternehmensbild?', answer: 'Binnenimage und Außenimage.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist das Binnenimage eines Unternehmens?', answer: 'Das Bild der Mitarbeiter von ihrem Unternehmen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist das Außenimage eines Unternehmens?', answer: 'Das Bild des Unternehmens durch die äußere Umwelt.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Warum sollten Binnenimage und Außenimage möglichst übereinstimmen?', answer: 'Weil Wiedererkennbarkeit das Zusammengehörigkeitsgefühl, den Firmenstolz und Synergieeffekte fördert.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche drei Elemente umfasst die Unternehmensphilosophie?', answer: 'Sinn der Unternehmung; Sinn der Produkte; Sinn der Arbeit.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet der Sinn der Unternehmung in der Unternehmensphilosophie?', answer: 'Sinn für Mitarbeiter, Kunden, Partner, Kultur, Gemeinde und weitere Anspruchsgruppen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet der Sinn der Produkte in der Unternehmensphilosophie?', answer: 'Produktnutzen für Kunden und Allgemeinheit sowie mögliche Gefahren.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet der Sinn der Arbeit in der Unternehmensphilosophie?', answer: 'Selbstverwirklichung und Verantwortung gegenüber Menschen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist Unternehmensphilosophie?', answer: 'Die Orientierung des Unternehmens. Sie soll Tätigkeiten einen Sinn geben und ist nur dann sinnvoll, wenn sie auch wirklich gelebt wird, also Teil der Kultur ist.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist Unternehmenskultur?', answer: 'Ein System von Normen, Werten und Haltungen, die das Verhalten der Mitarbeiter und damit das Erscheinungsbild des Unternehmens prägen. Sie ist eine weitgehend unsichtbare Steuergröße und wird selten reflektiert.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Ausprägungen der Unternehmenskultur gibt es?', answer: 'Führungsstil und Betriebsklima; Handlungsstrukturen; verbales Verhalten; Unternehmensidentität.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was umfasst Führungsstil und Betriebsklima als Ausprägung der Unternehmenskultur?', answer: 'Zum Beispiel Offenheit, Reglementierung und Beteiligung.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was umfasst Handlungsstrukturen als Ausprägung der Unternehmenskultur?', answer: 'Zum Beispiel Traditionen und Bräuche.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was umfasst verbales Verhalten als Ausprägung der Unternehmenskultur?', answer: 'Zum Beispiel Geschichten, Slogans und Sprache.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was umfasst Unternehmensidentität als Ausprägung der Unternehmenskultur?', answer: 'Eine einheitliche Außendarstellung, zum Beispiel Briefkopf, Logo oder Gebäude.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Ziele hat ein Unternehmensleitbild?', answer: 'Ausdruck der Unternehmensethik und Existenzgrundlage; Vertrauen stiften und Mitarbeiter motivieren; Orientierungs- und Stabilisierungsfunktion.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Inhalte hat ein Unternehmensleitbild?', answer: 'Kernbedürfnisse des Marktes, zum Beispiel Kundenwünsche; Mission des Unternehmens, zum Beispiel Wettbewerbsstrategie; Platz in der Gesellschaft, zum Beispiel Wertschöpfung.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Anforderungen hat ein Unternehmensleitbild?', answer: 'Allgemeingültigkeit; Widerspruchsfreiheit; Klarheit.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist eine Unternehmensverfassung?', answer: 'Die Leitungsorganisation der Unternehmung. Sie regelt die Zuordnung von Entscheidungskompetenzen und die Festlegung von Entscheidungsregeln.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche zwei Verfügungsrechte gibt es an Unternehmen?', answer: 'Ownership als Eigentum und Control als Steuerung, Vertragsgestaltung und Weisungsrecht.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Arten von Trägern von Führungsentscheidungen gibt es?', answer: 'Eigentümergeführte Unternehmen und managementgeführte Unternehmen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was zeichnet eigentümergeführte Unternehmen aus?', answer: 'Der Eigentümer trägt die Gesamtverantwortung, alle Verfügungsrechte liegen beim Eigentümer. Beispiele sind Einzelkaufmann und OHG.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was zeichnet managementgeführte Unternehmen aus?', answer: 'Entscheidungen werden an Manager delegiert, die Gehalt beziehen und selbst nicht wesentlich am Unternehmen beteiligt sein müssen. Sie entstehen vor allem bei fehlendem Interesse oder fehlender Fähigkeit der Eigentümer zur Führung.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Vorteile haben eigentümergeleitete Unternehmungen?', answer: 'Die Kombination von unbegrenzter Haftung und Leitung führt dazu, dass positive und negative Entscheidungsfolgen beim Eigentümer zusammenlaufen und keine externen Effekte entstehen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Nachteile haben eigentümergeleitete Unternehmungen?', answer: 'Erhöhter Delegationsbedarf sowie begrenztes Potenzial der Risikoübernahme und Kapitalaufbringung. Deshalb sind sie für Großunternehmen ungeeignet.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist die Idee managergeleiteter Unternehmungen?', answer: 'Die Spezialisierung von Eigentumsfunktion und Leitungsfunktion zwischen Eigentümern und Managern, zum Beispiel bei börsennotierten Aktiengesellschaften.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Rolle haben Aktionäre in managergeleiteten Unternehmungen?', answer: 'Sie geben Kapital, tragen Risiko und können durch kleine Stückelung ihrer Beteiligungen diversifizieren.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Rolle haben Manager in managergeleiteten Unternehmungen?', answer: 'Sie übernehmen die Unternehmensleitung, ohne selbst Kapital geben oder Risiko tragen zu müssen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Probleme können bei managergeleiteten Unternehmungen auftreten?', answer: 'Fehlanreize beim Manager, zum Beispiel überhöhte Ausgaben für Konsum wie Büro oder Dienstwagen, sowie Empire Building, also Kapitalakkumulation trotz unterlegener Rendite.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche drei Organe hat eine Aktiengesellschaft?', answer: 'Hauptversammlung; Aufsichtsrat; Vorstand.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Funktionen hat die Hauptversammlung?', answer: 'Sie wählt den Aufsichtsrat, fasst Grundsatzbeschlüsse, stimmt über die Höhe der Dividende ab und wählt den Abschlussprüfer.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Funktionen hat der Aufsichtsrat?', answer: 'Er bestellt den Vorstand, überwacht die Geschäftsführung und beauftragt den Abschlussprüfer.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Funktionen hat der Vorstand?', answer: 'Eigenverantwortliche Geschäftsführung, Bestellung in der Regel für maximal fünf Jahre mit möglicher Verlängerung und Bericht an den Aufsichtsrat.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche Zielmerkmale gibt es?', answer: 'Motivationsfunktion; Realitätsbezug; Verständlichkeit.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet Motivationsfunktion als Zielmerkmal?', answer: 'Ein Ziel soll einen Impuls zur Verbesserung der Situation geben.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet Realitätsbezug als Zielmerkmal?', answer: 'Ein Ziel soll erreichbar sein.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet Verständlichkeit als Zielmerkmal?', answer: 'Vor allem auf niedrigen Hierarchieebenen sollen Ziele operational, konkret und eher sachzielorientiert statt formalzielorientiert formuliert sein.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist strategisches Management?', answer: 'Die nachhaltige Entwicklung, Planung und Umsetzung unternehmerischer Ziele nach innen und gegenüber der Umwelt. Es legt den Rahmen für sämtliche weiteren Entscheidungen des Unternehmens fest.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche drei Bedeutungen von Strategy as a ... gibt es?', answer: 'Plan; Pattern; Position.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet Strategy as a Plan?', answer: 'Eine intendierte ex-ante-Richtlinie für das eigene Handeln.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet Strategy as a Pattern?', answer: 'Ein konsistentes Verhalten über die Zeit.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was bedeutet Strategy as a Position?', answer: 'Die Positionierung im Wettbewerbsumfeld.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Wie geht man bei der marktorientierten Wettbewerbsstrategie nach Porter vor?', answer: 'Markt; Produkte; Prozesse; Kompetenzen; Ressourcen. Das ist eine reine Außenorientierung und dient der Potenzialgestaltung.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche kollektiven Strategien zur Kooperation gibt es?', answer: 'Subunternehmerschaft; strategische Allianz; Joint Venture; Wertschöpfungspartnerschaft; Spin-off.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist Subunternehmerschaft?', answer: 'Die Übertragung von Teilfunktionen an rechtlich selbstständige Zulieferer. Diese erstellen auf Basis längerfristiger Verträge Leistungen nach Vorgaben des Abnehmers.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist eine strategische Allianz?', answer: 'Eine formalisierte, längerfristige Zusammenarbeit mit anderen Unternehmen zur gegenseitigen Kompensation von Schwächen und zur Erzielung von Wettbewerbsvorteilen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist ein Joint Venture?', answer: 'Zwei Unternehmen gründen gemeinsam ein drittes Unternehmen und beteiligen sich daran ungefähr zu gleichen Teilen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist eine Wertschöpfungspartnerschaft?', answer: 'Eine vertikale strategische Allianz entlang der Wertschöpfungskette mit Konzentration auf bestimmte Stufen der Wertschöpfung.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Was ist ein Spin-off?', answer: 'Eine meist technologieorientierte Ausgründung, bei der wissenschaftlich-technische Mitarbeiter des Inkubators als Transfermedium für technologisches Wissen dienen.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche unternehmensbezogenen Gegenstände strategischer Analyse gibt es?', answer: 'Stärken und Schwächen; vorhandene Potenziale; Kernkompetenzen; Entwicklungspotenziale.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Welche umweltbezogenen Gegenstände strategischer Analyse gibt es?', answer: 'Nachfrager; Lieferanten; Konkurrenten; Gesetze.' },
  { category: 'Die verschiedenen Ebenen der Unternehmensführung', question: 'Wie hängen normatives, strategisches, taktisches und operatives Management zusammen?', answer: 'Normativ: Querschnitt mit Unternehmenszielen und Vision. Strategisch: Erfolgspotenziale, Fähigkeitspotenziale und Wettbewerbsstrategien zur Positionierung im Wettbewerb. Taktisch: Gestaltung von Produkt-, Kunden-, Produktions-, Lieferanten- und Prozessstrukturen als Ableitung aus dem Strategischen. Operativ: Absatz-, Produktions- und Beschaffungsprogramm als Umsetzung durch die operative Ausführung.' },

  { category: 'Unternehmensführungsfunktionen', question: 'Welche drei Organisationsbegriffe gibt es?', answer: 'Instrumental: Organisation als Struktur eines Systems, also Aufbau- und Ablauforganisation. Funktional: Organisation als Tätigkeit oder Vorgang des Organisierens. Institutional: Organisation als zielgerichtetes, offenes, soziales System.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist die informelle Organisation?', answer: 'Sie bildet sich durch Sympathie, Antipathie und Beziehungen zwischen den Mitarbeitern und ist nicht formell festgehalten.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche zwei Arten von Organisation gibt es?', answer: 'Aufbauorganisation und Ablauforganisation.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Aufbauorganisation?', answer: 'Die Aufteilung und Koordination der Gesamtaufgabe und damit die Gestaltung der Institution.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Ablauforganisation?', answer: 'Die räumliche und zeitliche Organisation von Prozessen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist ein Liniensystem?', answer: 'Jede Stelle hat nur eine einzige unmittelbar vorgesetzte Stelle.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat das Einliniensystem?', answer: 'Vorteile: klare Weisungen und Berichte, straffer Aufbau, Verantwortung klar. Nachteile: lange und schwerfällige Befehlswege, Einhaltung des Dienstwegs, starke Belastung der oberen Instanzen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist ein Stabliniensystem?', answer: 'Stabsstellen unterstützen eine weisungsberechtigte Linienstelle, etwa durch Vorbereitung von Entscheidungen. Der Stab selbst hat keine Anordnungs-, sondern nur Beratungsbefugnis.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile haben Stabsstellen?', answer: 'Vorteile: Spezialkenntnisse nutzen, Instanzenzug bleibt erhalten. Nachteile: Stäbe unterbreiten nur Vorschläge und tragen keine Verantwortung, können großen Einfluss auf die Leitung haben und teilweise Linienfunktionen übernehmen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist eine Funktionalorganisation?', answer: 'Sie ist ein Mehrliniensystem. Jede Stelle kann mehrere unmittelbar vorgesetzte Stellen haben, von denen jede nur für bestimmte Aufgaben weisungsberechtigt ist.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat das Mehrliniensystem?', answer: 'Vorteile: kürzere Auftrags- und Informationswege, Spezialisierung der Vorgesetzten möglich. Nachteile: keine Einheit der Auftragserteilung, Überschneidungen möglich, Überbelastung der Mitarbeiter möglich.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Divisionalorganisation?', answer: 'Bei großen Unternehmen erfolgt die Organisation in Sparten, zum Beispiel nach Produktgruppen, mit Bildung von Teilbetrieben. Darüber sitzt eine Gesamtleitung.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat die Divisionalorganisation?', answer: 'Vorteile: kleinere und flexiblere Teilsysteme, Verantwortung klar abgrenzbar, starkes Verantwortungsgefühl der Spartenleiter. Nachteile: Abdriften von Unternehmenszielen, Beanspruchung überhöhter Budgets, Konflikte zwischen Sparten.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Matrixorganisation?', answer: 'Eine Organisationsform mit Weisungsbeziehungen aus zwei Dimensionen, wodurch Expertise aus zwei Bereichen zusammengeführt wird.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat die Matrixorganisation?', answer: 'Vorteile: direktere und kürzere Informationswege, Expertise aus zwei Bereichen. Nachteile: Weisungen von zwei Personen, mögliche Konflikte, Überschneidungen und Überbelastung der Mitarbeiter.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche zwei Aspekte hat die Ablauforganisation?', answer: 'Reihenfolgeplanung und Prozessorganisation.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Reihenfolgeplanung in der Ablauforganisation?', answer: 'Die Frage: Was wird wann, wo, von wem und womit erledigt?' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Prozessorganisation in der Ablauforganisation?', answer: 'Sie regelt Verantwortlichkeiten und stimmt Schnittstellen der Arbeitsteilung ab, unter anderem im Hinblick auf Transaktionskosten.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Ziele hat die Ablauforganisation im direkten Bereich?', answer: 'Hohe Auslastung, geringe Bestände, kurze Durchlaufzeiten und hohe Termintreue.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Ziele hat die Ablauforganisation im indirekten Bereich?', answer: 'Verbesserte Kommunikation, bessere Erreichbarkeit, Entlastung von Routine und Erleichterung der Dokumentation.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Planung?', answer: 'Ein subjektiver, zielgerichteter, zukunftsorientierter und systematischer Problemlösungsprozess. Er umfasst die Formulierung von Zielen, die Bestimmung von Maßnahmen, Auswahlentscheidungen, Anweisungen zur Realisierung, Wirtschaftlichkeit und Kontrolle.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche sechs Planungsgrundsätze gibt es?', answer: 'Vollständigkeit, Eindeutigkeit, Genauigkeit, Flexibilität, Kontinuität und Wirtschaftlichkeit.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Koordinationsfunktionen hat die Unternehmensplanung?', answer: 'Koordination der Unternehmensteilrechnungen wie Erfolgsrechnung, Bilanz und Kostenrechnung; Koordination der Unternehmensteilpläne wie Absatz, Produktion und Beschaffung; Koordination der Unternehmensführung mit ihrer Umwelt durch Anpassung, Innovation, Zuverlässigkeit und Optimalität.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist das Komplexitätsproblem der Unternehmensplanung?', answer: 'Je umfangreicher ein Problem ist und je weiter seine Folgen in die Zukunft reichen, desto komplexer wird die Planung.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Wie kann man das Komplexitätsproblem der Unternehmensplanung lösen?', answer: 'Durch Teilplanung über sachliche Aufteilung, zum Beispiel nach Funktionen oder Geschäftsfeldern, und zeitliche Aufteilung in langfristig, mittelfristig und kurzfristig. Wegen Interdependenzen ist die Koordination der Teilpläne notwendig.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Wie koordiniert man Teilpläne?', answer: 'Zeitlich durch progressive Planung, Gegenstromverfahren und rollierende Planung. Sachlich durch das Ausgleichsgesetz der Planung.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet horizontale Planung?', answer: 'Teilbereiche planen nicht isoliert, sondern müssen sich wechselseitig abstimmen. Das ist die horizontale Koordination der Teilpläne.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet vertikale Planung?', answer: 'Sie ist die vertikale Koordination der Teilpläne über strategische, taktische und operative Ebene hinweg.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche zwei Prinzipien gibt es zum Aufstellen von Teilplänen?', answer: 'Simultanprinzip und Sukzessivprinzip.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist das Simultanprinzip?', answer: 'Alle Teilpläne werden gleichzeitig und gemeinsam aufgestellt, zum Beispiel bei horizontaler Planung.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist das Sukzessivprinzip?', answer: 'Teilpläne werden aufeinanderfolgend nach einer Priorität oder Rangordnung aufgestellt. Frühere Pläne setzen Prämissen und Beschränkungen für nachfolgende Pläne.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Dominanz des Minimumsektors bzw. Ausgleichsgesetz der Planung?', answer: 'Es bestimmt die Reihenfolge der Teilpläne in einer Sukzessivplanung. Kritische Engpassbereiche sollen den größten Spielraum haben und zuerst geplant werden. Im Käufermarkt etwa Absatz, dann Fertigung, dann Beschaffung; im Verkäufermarkt Beschaffung, dann Fertigung, dann Absatz.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat die Top-Down-Planung?', answer: 'Vorteile: hohe Übereinstimmung mit dem Oberziel, hohe Konsistenz des Gesamtplans, Zentralisierung der Planungskompetenz. Nachteile: hoher Informationsbedarf und Planungsaufwand, vertikale Unmöglichkeit, geringe Motivation und Widerstände auf unteren Ebenen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat die Bottom-Up-Planung?', answer: 'Vorteile: Motivation der Planenden, hoher Informationszugang und Identifikation mit Planinhalten, hohes Maß an vertikaler Integration. Nachteile: keine ganzheitliche Erfassung, Risiko widersprüchlicher Teilpläne, hoher Zeitaufwand, Risiko suboptimaler Zielerreichung.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat die zirkuläre Planung?', answer: 'Vorteile: hohe Motivation, hohe Akzeptanz, Integration untergeordneter Hierarchieebenen. Nachteile: hoher Zeit- und Ressourcenaufwand, geringe Flexibilität, Störanfälligkeit.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was versteht man unter vertikaler Dekomposition in der Unternehmensplanung?', answer: 'Strategische Rahmenplanung als langfristige, aggregierte Gesamtplanung; taktische Konkretisierung als mittelfristige Bereichsplanung; operative Detailplanung als kurzfristige, disaggregierte Vollzugsplanung.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Anschlussplanung und wie unterscheidet sie sich von rollierender Planung?', answer: 'Anschlussplanung plant immer nur eine Periode und erst nach deren Ablauf die nächste. Rollierende Planung plant mehrere Perioden gleichzeitig mit abnehmendem Detailgrad; nach jeder Periode wird hinten eine neue angehängt, der Horizont bleibt konstant.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Personalführung?', answer: 'Zielorientierte Einflussnahme auf Einstellungen und Handlungsweisen der Mitarbeiter durch die Führungskraft. Sie ist Teil der Unternehmensführung und soll produktive soziale Systeme steuern.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was sind Führungsphilosophien?', answer: 'Grundlegende Annahmen darüber, wie Führung umgesetzt werden soll. Sie basieren auf Menschenbild und ideologischen Überzeugungen, etwa zum Grad der Kontrolle, zu Kritik und zu geeigneten Handlungsweisen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was sind Führungsgrundsätze?', answer: 'Konkrete, formalisierte Orientierungsmuster, häufig schriftliche Handlungsanweisungen für eine einheitliche Vorstellung von Personalführung im Unternehmen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was sind Führungssysteme?', answer: 'Auf Basis der Führungsphilosophie entwickelte Strukturen und Systeme zur Steuerung und Unterstützung der Führungsprozesse.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was ist Führungshandeln?', answer: 'Die Gesamtheit der Handlungsweisen der Führungskraft im Führungsprozess.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was sind Führungstechniken oder Führungsinstrumente?', answer: 'Elemente zur Führung, die auf Teilprozesse oder bestimmte Situationen zielen und konkrete Anregungen zu bestimmten Führungshandlungen geben.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche zwei grundlegenden Führungsansätze gibt es?', answer: 'Führung durch Strukturen und Führung durch Menschen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Führung durch Strukturen?', answer: 'Gestaltung von Strukturen wie Organisation, Personal und Informationen, zum Beispiel durch Organigramme oder Stellenbeschreibungen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Führung durch Menschen?', answer: 'Handeln der Führungskraft, etwa Ziele verdeutlichen, Aufgaben koordinieren und Mitarbeiter motivieren.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Management-by-Techniken gibt es?', answer: 'Management by Crisis, Objectives, Delegation, Exception, Decision Rules, Projects, Results und Systems.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Crisis?', answer: 'Durch Herbeiführung von Krisen soll die Leistung der Mitarbeiter gefördert werden.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Objectives?', answer: 'Ziele werden mit dem Mitarbeiter vereinbart, oft im Gegenstromverfahren. Der Weg zur Zielerreichung bleibt dem Mitarbeiter weitgehend frei; das Management ist ergebnisorientiert.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat Management by Objectives?', answer: 'Vorteile: Entlastung der Führungskraft, hohe Leistungsorientierung und objektive Bewertung möglich. Nachteile: organisatorischer Aufwand, quantitativ Messbares steht im Vordergrund, Erfolge nicht immer eindeutig zurechenbar.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Delegation?', answer: 'Aufgabenbereich, Kompetenzen und Verantwortung werden weitgehend an den Mitarbeiter delegiert. Entscheidungen werden eigenständig getroffen; eingegriffen wird nur in Ausnahmesituationen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat Management by Delegation?', answer: 'Vorteile: Entlastung der Führungskraft von Routineaufgaben, mehr Initiative, Motivation und Verantwortung beim Mitarbeiter. Nachteile: Delegation nur uninteressanter Aufgaben, starre Bürokratie, Probleme bei zu engem Delegationsrahmen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Exception?', answer: 'Management bei Abweichung von vereinbarten Zielen. Es umfasst Messgrößen, Bewertungsmaßstäbe, Toleranzgrenzen, Soll-Größen, Soll-Ist-Vergleich und Eingriff nur bei Bedarf.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Vor- und Nachteile hat Management by Exception?', answer: 'Vorteile: Entlastung der Führung, hohe Motivation der Mitarbeiter. Nachteile: Ausnahmefälle werden falsch eingeschätzt oder verschleiert, demotivierend, wenn Mitarbeitern Ausnahmesituationen nicht zugetraut werden.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Decision Rules?', answer: 'Führung durch Vorgabe detaillierter Arbeitsanweisungen und Regeln.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Projects?', answer: 'Führung durch Koordination, Planung, Steuerung und Überwachung von Projekten für neuartige und komplexe Aufgaben. Mit Beendigung der Aufgabe endet auch das Projekt.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Results?', answer: 'Führung durch Ergebnisüberwachung; die Ziele werden von der Führungsebene festgelegt.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Was bedeutet Management by Systems?', answer: 'Systemsteuerung durch Regelkreise und Prozesse mit Eigensteuerung und Rückmeldung von Ergebnissen.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Warum gibt es laut Theorie der Verfügungsrechte Unternehmungen?', answer: 'Als privatvertraglicher Ansatz, um Wertminderungen infolge externer Effekte und Transaktionskosten zu vermeiden. Ziel wirtschaftlichen Handelns ist die Minimierung von Transaktionskosten.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Probleme entstehen infolge von Unvollkommenheit und Opportunismus für Verfügungsrechte?', answer: 'Individuelle Optimierung des eigenen Gewinns, positive externe Effekte mit tendenziell zu geringem Faktoreinsatz sowie Interdependenz der Inputentscheidungen und Suche nach einem Nash-Gleichgewicht.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche vier Folgen asymmetrischer Informationsverteilung im Prinzipal-Agenten-Ansatz gibt es?', answer: 'Moral Hazard, Adverse Selection, Hold-up sowie Qualitäts- und Verhaltensunsicherheit.' },
  { category: 'Unternehmensführungsfunktionen', question: 'Welche Organisationsformen sollte man nennen können?', answer: 'Einliniensystem, Mehrliniensystem, Divisionalorganisation, Matrixorganisation und Stabliniensystem.' }
];

const STORAGE_THEME = 'studyCardsTheme_v2';
const STORAGE_SEEN = 'studyCardsSeen_v2';
const STORAGE_CORRECT = 'studyCardsCorrect_v2';
const STORAGE_WRONG = 'studyCardsWrong_v2';

const els = {
  totalCount: document.getElementById('totalCount'),
  stackCount: document.getElementById('stackCount'),
  seenCount: document.getElementById('seenCount'),
  correctCount: document.getElementById('correctCount'),
  wrongCount: document.getElementById('wrongCount'),
  positionCount: document.getElementById('positionCount'),
  category: document.getElementById('category'),
  search: document.getElementById('search'),
  limit: document.getElementById('limit'),
  order: document.getElementById('order'),
  startBtn: document.getElementById('startBtn'),
  restartBtn: document.getElementById('restartBtn'),
  themeBtn: document.getElementById('themeBtn'),
  resetProgressBtn: document.getElementById('resetProgressBtn'),
  bar: document.getElementById('bar'),
  meta: document.getElementById('meta'),
  question: document.getElementById('question'),
  answer: document.getElementById('answer'),
  showBtn: document.getElementById('showBtn'),
  correctBtn: document.getElementById('correctBtn'),
  wrongBtn: document.getElementById('wrongBtn'),
  nextBtn: document.getElementById('nextBtn')
};

let stack = [];
let current = null;
let currentIndex = 0;
let seen = new Set();
let correct = 0;
let wrong = 0;
let currentMarked = false;

function loadSeen() {
  try {
    const raw = localStorage.getItem(STORAGE_SEEN);
    if (raw) seen = new Set(JSON.parse(raw));
  } catch (e) {
    seen = new Set();
  }
}

function saveSeen() {
  localStorage.setItem(STORAGE_SEEN, JSON.stringify(Array.from(seen)));
}

function loadCounters() {
  correct = Number(localStorage.getItem(STORAGE_CORRECT) || '0');
  wrong = Number(localStorage.getItem(STORAGE_WRONG) || '0');
}

function saveCounters() {
  localStorage.setItem(STORAGE_CORRECT, String(correct));
  localStorage.setItem(STORAGE_WRONG, String(wrong));
}

function qKey(item) {
  return item.category + '||' + item.question + '||' + item.answer;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function applyTheme(mode) {
  document.body.classList.toggle('light', mode === 'light');
  els.themeBtn.textContent = mode === 'light' ? 'Dunkelmodus' : 'Hellmodus';
  localStorage.setItem(STORAGE_THEME, mode);
}

function updateStats() {
  els.totalCount.textContent = ALL_QUESTIONS.length;
  els.stackCount.textContent = stack.length;
  els.seenCount.textContent = seen.size;
  els.correctCount.textContent = correct;
  els.wrongCount.textContent = wrong;
  els.positionCount.textContent = (stack.length || current)
    ? `${Math.min(currentIndex, Math.max(currentIndex, 1))} / ${stack.length + currentIndex}`
    : '0 / 0';

  const done = currentIndex > 0 ? currentIndex - (current ? 1 : 0) : 0;
  const denom = Math.max(done + stack.length + (current ? 1 : 0), 1);
  els.bar.style.width = `${(done / denom) * 100}%`;
}

function buildStack() {
  const selectedCategory = els.category.value;
  const q = els.search.value.trim().toLowerCase();
  const limit = Number(els.limit.value);
  const order = els.order.value;

  let filtered = ALL_QUESTIONS.filter((item) => {
    const matchesCategory = selectedCategory === 'all' || item.category === selectedCategory;
    const text = `${item.question} ${item.answer} ${item.category}`.toLowerCase();
    const matchesSearch = !q || text.includes(q);
    return matchesCategory && matchesSearch;
  });

  if (order === 'unseen') {
    filtered = filtered.filter((item) => !seen.has(qKey(item)));
  }

  if (order === 'random') {
    filtered = shuffle(filtered);
  }

  if (limit > 0) {
    filtered = filtered.slice(0, limit);
  }

  stack = filtered;
  current = null;
  currentIndex = 0;

  if (!stack.length) {
    els.meta.textContent = '';
    els.question.textContent = 'Keine passenden Fragen gefunden.';
    els.answer.textContent = '';
    els.answer.classList.add('hidden');
    els.showBtn.classList.add('hidden');
    els.correctBtn.classList.add('hidden');
    els.wrongBtn.classList.add('hidden');
    els.nextBtn.classList.add('hidden');
    updateStats();
    return;
  }

  nextQuestion();
}

function formatAnswer(text) {
  return text
    .replace(/\s–\s/g, '\n– ')
    .replace(/\.\s([A-ZÄÖÜ][A-Za-zÄÖÜäöüß0-9\-\/() ]{2,40}:)/g, '.\n$1')
    .replace(/:\s–\s/g, ':\n– ')
    .replace(/;\s*/g, ';\n')
    .trim();
}

function renderQuestion() {
  if (!current) return;
  els.meta.textContent = `${current.category} · Lernkarte ${currentIndex}`;
  els.question.textContent = current.question;
  els.answer.textContent = formatAnswer(current.answer);
  els.answer.classList.add('hidden');
  els.showBtn.classList.remove('hidden');
  currentMarked = false;
  els.correctBtn.classList.add('hidden');
  els.wrongBtn.classList.add('hidden');
  els.nextBtn.classList.add('hidden');
  els.correctBtn.disabled = false;
  els.wrongBtn.disabled = false;
  updateStats();
}

function markAnswer(isCorrect) {
  if (!current || currentMarked) return;
  currentMarked = true;

  if (isCorrect) {
    correct += 1;
    els.meta.textContent = `${current.category} · Lernkarte ${currentIndex} · als richtig markiert`;
  } else {
    wrong += 1;
    els.meta.textContent = `${current.category} · Lernkarte ${currentIndex} · als falsch markiert`;
  }

  saveCounters();
  updateStats();
  els.correctBtn.disabled = true;
  els.wrongBtn.disabled = true;
}

function nextQuestion() {
  if (!stack.length) {
    current = null;
    els.meta.textContent = 'Fertig';
    els.question.textContent = 'Alle ausgewählten Lernkarten wurden angezeigt.';
    els.answer.textContent = '';
    els.answer.classList.add('hidden');
    els.showBtn.classList.add('hidden');
    els.correctBtn.classList.add('hidden');
    els.wrongBtn.classList.add('hidden');
    els.nextBtn.classList.add('hidden');
    updateStats();
    return;
  }

  current = stack.shift();
  currentIndex += 1;
  seen.add(qKey(current));
  saveSeen();
  renderQuestion();
}

els.startBtn.addEventListener('click', buildStack);
els.restartBtn.addEventListener('click', buildStack);
els.showBtn.addEventListener('click', () => {
  if (!current) return;
  els.answer.classList.remove('hidden');
  els.showBtn.classList.add('hidden');
  els.correctBtn.classList.remove('hidden');
  els.wrongBtn.classList.remove('hidden');
  els.nextBtn.classList.remove('hidden');
});
els.correctBtn.addEventListener('click', () => markAnswer(true));
els.wrongBtn.addEventListener('click', () => markAnswer(false));
els.nextBtn.addEventListener('click', nextQuestion);
els.themeBtn.addEventListener('click', () => {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
});
els.resetProgressBtn.addEventListener('click', () => {
  localStorage.removeItem(STORAGE_SEEN);
  localStorage.removeItem(STORAGE_CORRECT);
  localStorage.removeItem(STORAGE_WRONG);
  seen = new Set();
  correct = 0;
  wrong = 0;
  updateStats();
  alert('Gespeicherter Fortschritt sowie Richtig/Falsch-Zähler wurden zurückgesetzt.');
});

loadSeen();
loadCounters();
applyTheme(localStorage.getItem(STORAGE_THEME) || 'dark');
updateStats();
</script>
</body>
</html>
